<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>一日叙事</title>
    <style>
        :root {
            --bg: #fafaf9;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8a8a8a;
            --accent-green: #2d6a4f;
            --accent-green-light: #40916c;
            --accent-green-soft: #e8f3ee;
            --accent-indigo: #3a4f7a;
            --accent-indigo-light: #4a6290;
            --accent-indigo-soft: #eef1f8;
            --border: #e2e2de;
            --border-light: #f0f0ea;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            --font-sans: 'PingFang SC', -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            --transition: 0.2s cubic-bezier(0.2, 0, 0.1, 1);
            --max-width: 640px;
            --breathe-color-1: rgba(45, 106, 79, 0.1);
            --breathe-color-2: rgba(45, 106, 79, 0.25);
            --category-bg: #f3f3ef;
            --category-text: #4a4a4a;
            --tool-bg: #edf2f8;
            --tool-text: #2a4b6e;
            --question-bg: #fafaf9;
            --focus-bg: #ffffff;
            --overtime-color: #c44d34;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.65;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px 80px;
            -webkit-font-smoothing: antialiased;
            position: relative;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            font-size: 1.05rem;
        }
        .app-container {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .focus-overlay {
            position: fixed;
            inset: 0;
            background: var(--focus-bg);
            z-index: 1500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--font-sans);
            color: var(--text);
            padding: 20px;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .focus-timer {
            font-size: 4.8rem;
            font-weight: 300;
            font-family: var(--font-mono);
            color: var(--accent-green);
            letter-spacing: 0.04em;
            margin-bottom: 12px;
            line-height: 1;
        }
        .focus-info {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            font-family: var(--font-sans);
        }
        .focus-info span {
            font-weight: 500;
        }
        .focus-info .overtime {
            color: var(--overtime-color);
            font-weight: 600;
        }
        .btn-end-focus {
            padding: 12px 36px;
            border-radius: 24px;
            border: 2px solid var(--accent-green);
            background: transparent;
            color: var(--accent-green);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.03em;
            font-family: var(--font-sans);
            margin-top: 18px;
        }
        .btn-end-focus:hover {
            background: var(--accent-green);
            color: #fff;
        }

        .menu-fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 900;
            transition: all var(--transition);
            color: rgba(0, 0, 0, 0.25);
            font-size: 20px;
            user-select: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            font-weight: 400;
            line-height: 1;
        }
        .menu-fab:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(45, 106, 79, 0.25);
            color: rgba(45, 106, 79, 0.55);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            transform: scale(1.04);
        }
        .menu-fab-inner {
            display: inline-block;
            line-height: 1;
            pointer-events: none;
            transform: none;
            font-size: 20px;
        }
        .menu-popup {
            position: fixed;
            bottom: 78px;
            right: 28px;
            z-index: 910;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: var(--shadow-lg);
            display: none;
            flex-direction: column;
            padding: 8px 0;
            min-width: 150px;
            animation: slideUpMenu 0.2s ease;
            font-family: var(--font-sans);
        }
        .menu-popup.active {
            display: flex;
        }
        @keyframes slideUpMenu {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .menu-popup-item {
            padding: 12px 22px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text);
            transition: all var(--transition);
            border: none;
            background: transparent;
            text-align: left;
            font-family: var(--font-sans);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .menu-popup-item:hover {
            background: var(--accent-green-soft);
            color: var(--accent-green);
        }
        .menu-backdrop {
            position: fixed;
            inset: 0;
            z-index: 905;
            display: none;
        }
        .menu-backdrop.active {
            display: block;
        }

        .header-section {
            text-align: center;
            padding: 12px 0 4px;
            font-family: var(--font-sans);
        }
        .date-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .date-nav-input {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: var(--font-sans);
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: all var(--transition);
            -webkit-appearance: auto;
            appearance: auto;
            min-width: 130px;
        }
        .date-nav-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px var(--accent-green-soft);
        }
        .date-nav-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.88rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .date-nav-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: var(--accent-green-soft);
        }
        .date-weekday {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .date-relative-text {
            font-size: 0.93rem;
            font-weight: 500;
            color: var(--accent-indigo);
            margin: 0 2px;
        }
        .identity-intention-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent-indigo);
            line-height: 2.3;
            gap: 0 4px;
            padding: 6px 0;
            font-family: var(--font-sans);
        }
        .identity-intention-wrapper span {
            white-space: nowrap;
            font-weight: 500;
        }
        .identity-input {
            border: none;
            border-bottom: 2px solid var(--accent-indigo-light);
            background: transparent;
            font-size: 1.2rem;
            font-family: var(--font-sans);
            color: var(--accent-indigo);
            padding: 2px 8px;
            margin: 0 2px;
            outline: none;
            width: auto;
            min-width: 10px;
            text-align: center;
            transition: border-color 0.2s, width 0.1s;
            font-weight: 500;
            overflow: visible;
            white-space: nowrap;
        }
        .identity-input:focus {
            border-bottom-color: var(--accent-green);
            background: var(--accent-green-soft);
            border-radius: 4px;
        }
        .identity-input[readonly] {
            border-bottom-style: solid;
            cursor: default;
        }
        .daily-review-badge {
            display: inline-block;
            font-size: 0.88rem;
            color: var(--accent-green);
            background: var(--accent-green-soft);
            padding: 5px 16px;
            border-radius: 16px;
            margin-top: 8px;
            font-weight: 500;
            font-family: var(--font-sans);
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 22px;
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.03em;
            flex-wrap: wrap;
            font-family: var(--font-sans);
        }
        .stats-bar span {
            font-weight: 500;
            color: var(--text-secondary);
        }
        .stats-bar strong {
            font-weight: 600;
            color: var(--text);
        }

        .create-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 22px;
            box-shadow: var(--shadow);
            font-family: var(--font-sans);
        }
        .btn-add-task {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent-green);
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: all var(--transition);
            letter-spacing: 0.02em;
            font-family: var(--font-sans);
        }
        .btn-add-task:hover {
            border-color: var(--accent-green);
            background: var(--accent-green-soft);
            color: var(--accent-green-light);
        }
        .create-form {
            display: none;
            flex-direction: column;
            gap: 18px;
            margin-top: 18px;
            animation: fadeSlideIn 0.2s ease;
        }
        .create-form.active {
            display: flex;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .sentence-form {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 6px 8px;
            font-size: 0.98rem;
            color: var(--text);
            line-height: 2.0;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 18px 16px;
            font-family: var(--font-sans);
        }
        .inline-input {
            border: none;
            border-bottom: 2px solid var(--accent-indigo-light);
            background: transparent;
            font-family: var(--font-sans);
            font-size: 0.98rem;
            color: var(--text);
            padding: 5px 8px 5px 6px;
            outline: none;
            width: auto;
            min-width: 30px;
            transition: border-color 0.2s, width 0.2s;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.01em;
            flex-shrink: 1;
            flex-grow: 0;
        }
        .inline-input:focus {
            border-bottom-color: var(--accent-green);
            background: var(--accent-green-soft);
            border-radius: 4px;
        }
        .inline-input[type="time"] {
            width: 100px;
            min-width: 100px;
            max-width: 100px;
            text-align: center;
            font-family: var(--font-mono);
            -webkit-appearance: auto;
            appearance: auto;
            flex-shrink: 0;
            padding-right: 8px;
        }
        .btn-save-task {
            align-self: center;
            padding: 12px 30px;
            border-radius: 22px;
            border: none;
            background: var(--accent-green);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.03em;
            font-family: var(--font-sans);
            margin-top: 6px;
        }
        .btn-save-task:hover {
            background: var(--accent-green-light);
            box-shadow: var(--shadow-md);
        }

        .dropdown-input-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .inline-input.with-dropdown {
            padding-right: 22px;
        }
        .dropdown-btn {
            position: absolute;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
            transition: color var(--transition);
        }
        .dropdown-btn:hover {
            color: var(--accent-green);
        }
        .dropdown-options {
            position: absolute;
            top: 100%;
            left: 0;
            z-index: 950;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            box-shadow: var(--shadow-md);
            min-width: 120px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            padding: 4px 0;
        }
        .dropdown-options.active {
            display: block;
        }
        .dropdown-option-item {
            padding: 8px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text);
            white-space: nowrap;
        }
        .dropdown-option-item:hover {
            background: var(--accent-green-soft);
            color: var(--accent-green);
        }

        .tasks-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .no-tasks-hint {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            padding: 44px 20px;
            font-family: var(--font-sans);
        }
        .task-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-family: var(--font-sans);
        }
        .task-card:hover {
            box-shadow: var(--shadow-md);
            border-color: #d0d0ca;
        }
        .task-card.completed {
            opacity: 0.78;
            background: #fafaf9;
            border-color: var(--border-light);
        }
        .task-card.completed .task-narrative span {
            text-decoration: line-through;
            text-decoration-color: #aaa;
        }
        .task-card.completed .task-narrative .narr-category,
        .task-card.completed .task-narrative .narr-tool {
            text-decoration: none;
        }
        .task-card.timing-active {
            border-color: var(--accent-green);
            animation: breathe 2.5s ease-in-out infinite;
            background: #f9fdfb;
        }
        .task-content {
            flex: 1;
            min-width: 0;
        }
        @keyframes breathe {
            0%,
            100% {
                box-shadow: 0 0 6px var(--breathe-color-1);
            }
            50% {
                box-shadow: 0 0 16px var(--breathe-color-2);
            }
        }
        .task-narrative {
            font-size: 0.98rem;
            color: var(--text);
            margin-bottom: 10px;
            word-break: break-word;
            line-height: 1.6;
        }
        .narr-category {
            display: inline-block;
            background: var(--category-bg);
            color: var(--category-text);
            font-weight: 600;
            font-size: 0.82rem;
            padding: 3px 11px;
            border-radius: 12px;
            margin-right: 6px;
        }
        .narr-tool {
            display: inline-block;
            background: var(--tool-bg);
            color: var(--tool-text);
            font-weight: 600;
            font-size: 0.82rem;
            padding: 3px 11px;
            border-radius: 12px;
            margin-right: 6px;
        }
        .narr-time {
            color: var(--accent-indigo);
            font-weight: 600;
            font-family: var(--font-mono);
        }
        .narr-place {
            color: var(--text-secondary);
        }
        .narr-people {
            color: var(--accent-green);
            font-weight: 500;
        }
        .narr-title {
            font-weight: 600;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.86rem;
            color: var(--text-muted);
            font-family: var(--font-sans);
        }
        .timer-display {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-green);
            background: var(--accent-green-soft);
            padding: 4px 12px;
            border-radius: 14px;
        }
        .accumulated-time {
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }
        .task-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .btn-task {
            font-size: 0.86rem;
            padding: 8px 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
            letter-spacing: 0.02em;
            font-family: var(--font-sans);
        }
        .btn-task:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: var(--accent-green-soft);
        }
        .btn-task.btn-start {
            background: var(--accent-green);
            color: #fff;
            border-color: var(--accent-green);
        }
        .btn-task.btn-start:hover {
            background: var(--accent-green-light);
        }
        .btn-task.btn-end {
            background: #c44d34;
            color: #fff;
            border-color: #c44d34;
        }
        .btn-task.btn-view {
            color: var(--accent-indigo);
            border-color: var(--accent-indigo-light);
        }
        .btn-task.btn-edit {
            color: var(--accent-indigo);
            border-color: var(--accent-indigo-light);
        }
        .btn-task.btn-uncomplete {
            color: #c44d34;
            border-color: #c44d34;
        }
        .completed-check {
            color: var(--accent-green);
            font-weight: 600;
            font-size: 0.86rem;
        }

        .daily-review-section {
            text-align: center;
            padding: 14px 0 22px;
            font-family: var(--font-sans);
        }
        .btn-daily-review {
            padding: 15px 38px;
            border-radius: 28px;
            border: none;
            background: var(--accent-indigo);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(58, 79, 122, 0.15);
            transition: all var(--transition);
            letter-spacing: 0.03em;
            font-family: var(--font-sans);
        }
        .btn-daily-review:hover {
            background: var(--accent-indigo-light);
            box-shadow: 0 4px 16px rgba(58, 79, 122, 0.25);
            transform: translateY(-1px);
        }
        .btn-daily-review.is-done {
            background: #5a7a5a;
            color: #fff;
        }

        .question-block {
            background: var(--question-bg);
            border-radius: var(--radius-sm);
            padding: 15px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-light);
            font-family: var(--font-sans);
        }
        .question-text {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        .options-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .opt-btn {
            flex: 1;
            min-width: 70px;
            padding: 9px 8px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: #fff;
            font-size: 0.86rem;
            cursor: pointer;
            text-align: center;
            transition: all var(--transition);
            font-weight: 500;
            color: var(--text-secondary);
            font-family: var(--font-sans);
        }
        .opt-btn:hover {
            border-color: var(--accent-green);
            background: var(--accent-green-soft);
            color: var(--accent-green);
        }
        .opt-btn.selected {
            background: var(--accent-green);
            color: #fff;
            border-color: var(--accent-green);
            font-weight: 600;
        }
        .score-preview {
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 16px 0 8px;
            color: var(--accent-green);
            font-family: var(--font-sans);
        }
        .score-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.88rem;
            font-family: var(--font-sans);
        }
        .score-detail-row:last-child {
            border-bottom: none;
        }
        .score-detail-label {
            color: var(--text-secondary);
            flex: 1;
        }
        .score-detail-value {

            function getWeekdayCN(dateStr) { const [y, m, d] = dateStr.split('-').map(Number); const date = new Date(y, m - 1, d); const w = ['星期日',

            function computeWeightedScore() { const dayData = getDayData(currentViewDate); const completed = dayData.tasks.filter(t =>
                    t.completed && t.reflection); if (completed.length === 0) return null; let totalWeight = 0,
                    weightedSum = 0;
                completed.forEach(t => { const dur = t.reflection.actualDuration || 0; const rating = t.reflection.rating || 0;
                    weightedSum += rating * dur;
                    totalWeight += dur; }); return totalWeight > 0 ? weightedSum / totalWeight : (completed.reduce((s, t) => s + (t
                    .reflection.rating || 0), 0) / completed.length); }

            0; }

tListener('click', () => { tabEdit.classList.add('active'); tabHistory.classList.remove('active'); editPanel.style.display = ''; historyPanel.style.display = 'none'; }); tabHistory.addEventListener('click', () => { tabHistory.classList.add('active'); tabEdit.classList.remove('active'); editPanel.style.display = 'none'; historyPanel.style.display = ''; refreshHistory(); }); document.getElementById('btnCloseDraft').onclick = closeModal; document.getElementById('btnSaveDraft').onclick = () => { const content = textarea.value.trim(); if (!content) { showToast('请输入草稿内容'); return; } const currentDrafts = loadDrafts(); currentDrafts.push({ id: uuid(), content, createdAt: new Date().toISOString() }); saveDrafts(currentDrafts); textarea.value = ''; showToast('草稿已保存'); refreshHistory(); }; bindHistoryEvents(); addEscListener(closeModal); }

            function showDesignModal() { const html = `<div class="modal-dialog"><button class="modal-close-x" id="btnCloseDesign">×</button><h3>设计理念</h3><div class="design-text"><strong>记录此刻，成为自己。</strong>一日叙事不追求完美的长期计划，而是将注意力拉回每一个"今天"。通过结构化的任务记录、专注计时与基于自我决定理论的复盘，我们试图让微小的行动被看见，让成长有迹可循。这里没有评判，只有觉察。愿你在此，安心地成为自己。</div><div class="modal-actions"><button class="btn-modal-primary" id="btnCloseDesignBtn">关闭</button></div></div>`; openModal(html); document.getElementById('btnCloseDesign').onclick = closeModal; document.getElementById('btnCloseDesignBtn').onclick = closeModal; addEscListener(closeModal); }

            function showBehaviorDataModal() { const allData = loadAll(); const dateKeys = Object.keys(allData).sort(); let totalTasks = 0, totalCompleted = 0, totalDurationSec = 0, totalReflections = 0; const categoryStats = {}; const dailyStats = []; dateKeys.forEach(dk => { const dd = allData[dk]; const tasks = dd.tasks || []; totalTasks += tasks.length; const completed = tasks.filter(t => t.completed); totalCompleted += completed.length; if (dd.dailyReflection?.completedAt) totalReflections++; tasks.forEach(t => { if (t.records) { t.records.forEach(r => { totalDurationSec += (r.duration || 0); }); } if (t.category) { const cat = t.category.trim(); if (!categoryStats[cat]) categoryStats[cat] = { count: 0, duration: 0 }; categoryStats[cat].count++; if (t.records) { t.records.forEach(r => { categoryStats[cat].duration += (r.duration || 0); }); } } }); dailyStats.push({ date: dk, total: tasks.length, completed: completed.length, duration: tasks.reduce((s, t) => s + (t.records || []).reduce((ss, r) => ss + (r.duration || 0), 0), 0) }); }); const completionRate = totalTasks > 0 ? Math.round((totalCompleted / totalTasks) * 100) : 0; const avgTasksPerDay = dateKeys.length > 0 ? (totalTasks / dateKeys.length).toFixed(1) : '0'; let categoryHtml = ''; const catEntries = Object.entries(categoryStats).sort((a, b) => b[1].duration - a[1].duration); catEntries.slice(0, 10).forEach(([cat, stat]) => { categoryHtml += `<tr><td>${escapeHTML(cat)}</td><td>${stat.count}次</td><td>${formatDurationFull(stat.duration)}</td></tr>`; }); if (!categoryHtml) categoryHtml = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">暂无分类数据</td></tr>'; let recentHtml = ''; dailyStats.slice(-7).reverse().forEach(ds => { recentHtml += `<tr><td>${ds.date} ${getWeekdayCN(ds.date)}</td><td>${ds.total}</td><td>${ds.completed}</td><td>${formatDurationFull(ds.duration)}</td></tr>`; }); if (!recentHtml) recentHtml = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">暂无数据</td></tr>'; const html = `<div class="modal-dialog" style="max-width:640px;max-height:80vh;"><button class="modal-close-x" id="btnCloseBehavior">×</button><h3>行为数据</h3><div class="behavior-highlight"><strong>总览：</strong>共记录 <strong>${dateKeys.length}</strong> 天 | 总任务 <strong>${totalTasks}</strong> 个 | 完成率 <strong>${completionRate}%</strong> | 总计时长 <strong>${formatDurationFull(totalDurationSec)}</strong> | 复盘 <strong>${totalReflections}</strong> 天 | 日均 <strong>${avgTasksPerDay}</strong> 个任务</div><div style="margin-top:16px;"><strong style="font-size:0.95rem;">类别统计（按时长排序）</strong><table class="behavior-summary-table"><thead><tr><th>类别</th><th>次数</th><th>累计时长</th></tr></thead><tbody>${categoryHtml}</tbody></table></div><div style="margin-top:16px;"><strong style="font-size:0.95rem;">最近7天趋势</strong><table class="behavior-summary-table"><thead><tr><th>日期</th><th>任务数</th><th>完成</th><th>时长</th></tr></thead><tbody>${recentHtml}</tbody></table></div><div class="modal-actions"><button class="btn-modal-primary" id="btnCloseBehaviorBtn">关闭</button></div></div>`; openModal(html); document.getElementById('btnCloseBehavior').onclick = closeModal; document.getElementById('btnCloseBehaviorBtn').onclick = closeModal; addEscListener(closeModal); }

            function initDropdowns() { document.querySelectorAll('.dropdown-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const targetId = btn.dataset.target; const input = document.getElementById(targetId); if (!input) return; const options = presetOptions[targetId] || []; if (options.length === 0) return; const rect = btn.getBoundingClientRect(); dropdownOptionsMenu.innerHTML = options.map(opt => `<div class="dropdown-option-item">${escapeHTML(opt)}</div>`).join(''); dropdownOptionsMenu.style.top = (rect.bottom + 4) + 'px'; dropdownOptionsMenu.style.left = (rect.left - 10) + 'px'; dropdownOptionsMenu.classList.add('active'); dropdownOptionsMenu.querySelectorAll('.dropdown-option-item').forEach(item => { item.addEventListener('click', () => { input.value = item.textContent; autoWidth(input); dropdownOptionsMenu.classList.remove('active'); }); }); setTimeout(() => { document.addEventListener('click', function closeDropdown(e) { if (!dropdownOptionsMenu.contains(e.target) && e.target !== btn) { dropdownOptionsMenu.classList.remove('active'); document.removeEventListener('click', closeDropdown); } }); }, 10); }); }); }

            menuFab.addEventListener('click', () => { const isActive = menuPopup.classList.contains('active'); if (isActive) { menuPopup.classList.remove('active'); menuBackdrop.classList.remove('active'); } else { menuPopup.classList.add('active'); menuBackdrop.classList.add('active'); } });
            menuBackdrop.addEventListener('click', () => { menuPopup.classList.remove('active'); menuBackdrop.classList.remove('active'); });
            document.getElementById('menuDataManagement').addEventListener('click', () => { menuPopup.classList.remove('active'); menuBackdrop.classList.remove('active'); showDataManagementModal(); });
            document.getElementById('menuBehaviorData').addEventListener('click', () => { menuPopup.classList.remove('active'); menuBackdrop.classList.remove('active'); showBehaviorDataModal(); });
            document.getElementById('menuDraft').addEventListener('click', () => { menuPopup.classList.remove('active'); menuBackdrop.classList.remove('active'); showDraftModal(); });
            document.getElementById('menuDesign').addEventListener('click', () => { menuPopup.classList.remove('active'); menuBackdrop.classList.remove('active'); showDesignModal(); });

            btnSave.addEventListener('click', () => { if (!isTodayView && !isFutureView) return; const start = inputStartTime.value, end = inputEndTime.value; const place = inputPlace.value.trim(), people = inputPeople.value.trim(); const category = inputCategory.value.trim(), tool = inputTool.value.trim(); const title = inputTitle.value.trim(); if (!start || !end || !place || !people || !category || !title) { showToast('请填写所有必填字段'); return; } const dayData = getDayData(currentViewDate); const task = { id: uuid(), startTime: start, endTime: end, place, people, category, tool, title, records: [], reflection: null, completed: false, activeTimingStart: null, createdAt: new Date().toISOString(), versions: [] }; addVersion(task, 'created', false); dayData.tasks.push(task); dayData.stats.createdCount = (dayData.stats.createdCount || 0) + 1; saveDayData(currentViewDate, dayData); inputStartTime.value = '09:00'; inputEndTime.value = '10:00'; inputPlace.value = inputPeople.value = inputCategory.value = inputTool.value = inputTitle.value = ''; createForm.classList.remove('active'); renderTasks(dayData.tasks); updateStatsDisplay(dayData); updateTotalDurationDisplay(); showToast('任务已添加'); });
            btnToggle.addEventListener('click', () => { if (isTodayView || isFutureView) { createForm.classList.toggle('active'); if (createForm.classList.contains('active')) { setTimeout(adjustAllInlineInputs, 50); initDropdowns(); } } });

            btnBackToday.addEventListener('click', () => { currentViewDate = getTodayKey(); updateUIMode(); });

            dateNavInput.max = getTomorrowKey(); dateNavInput.value = currentViewDate;
            dateNavInput.addEventListener('change', () => { if (dateNavInput.value > getTomorrowKey()) { showToast('仅可查看今天或明天'); dateNavInput.value = currentViewDate; return; } currentViewDate = dateNavInput.value; updateUIMode(); });

            function openModal(html) { modalOverlay.innerHTML = html; modalOverlay.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
            function closeModal() { modalOverlay.innerHTML = ''; modalOverlay.style.display = 'none'; document.body.style.overflow = ''; if (window._escHandler) { document.removeEventListener('keydown', window._escHandler); window._escHandler = null; } }
            function addEscListener(fn) { if (window._escHandler) document.removeEventListener('keydown', window._escHandler); const h = e => { if (e.key === 'Escape') { fn(); document.removeEventListener('keydown', h); window._escHandler = null; } }; window._escHandler = h; document.addEventListener('keydown', h); }

            let intentionTimer;
            [throughEl, becomeEl].forEach(el => { el.addEventListener('input', () => { clearTimeout(intentionTimer); intentionTimer = setTimeout(saveCurrentIntention, 500); }); el.addEventListener('blur', saveCurrentIntention); });

            updateUIMode(); if (isTodayView) restoreTiming(); let lastDateCheck = getTodayKey();
            setInterval(() => { if (getTodayKey() !== lastDateCheck) { lastDateCheck = getTodayKey(); if (isTodayView) { currentViewDate = getTodayKey(); updateUIMode(); restoreTiming(); } showToast('新的一天'); } updateTotalDurationDisplay(); }, 30000);
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker 注册成功'))
                    .catch(err => console.log('Service Worker 注册失败', err));
            });
        }
    </script>
